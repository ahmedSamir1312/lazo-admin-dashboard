<mat-sidenav-container autosize>
  <mat-sidenav [opened]="!isMobile" mode="side">
    <mat-nav-list>
      <div class="m-3 text-center" [routerLink]="['/home']">
        <img src="assets/images/logo.svg" height="70px" width="70px" />
      </div>
    </mat-nav-list>

    <mat-nav-list *ngFor="let item of sidebar">
      <a
        *ngIf="item.path"
        mat-list-item
        [routerLink]="[item.path]"
        [routerLinkActive]="'active'"
        [routerLinkActiveOptions]="item.active"
      >
        <span class="entry d-flex align-items-center">
          <img [src]="item?.icon" class="mx-2" width="20px" height="20px" />
          <span>{{ item?.name }}</span>
        </span>
      </a>
    </mat-nav-list>
    <mat-nav-list>
      <a mat-list-item class="logout" (click)="logout()">
        <span class="entry">
          <img src="assets/images/sidebar/logout.svg" class="mx-2" />
          <span class="text-danger">Logout</span>
        </span>
      </a>
    </mat-nav-list>
    <mat-nav-list>
      <a mat-list-item>
        <span class="entry">
          <span class="text-secondary"> version 28 Jan</span>
        </span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content [ngClass]="isMobile ? ' ' : 'mobile'" class="p-5">
    <mat-toolbar class="justify-content-between px-5">
      <div class="d-flex mt-2">
        <button
          mat-icon-button
          aria-label="Menu icon"
          (click)="isMobile = !isMobile"
        >
          <mat-icon>menu</mat-icon>
        </button>
        <div class="welcomMsg d-inline m-auto ps-3">
          <p>
            {{ 1 < 12 ? "Good Morning " : "Good Evening" }}
            <img
              class="mx-1"
              src="assets/images/welcome.svg"
              height="25px"
              width="25px"
            />
          </p>
          <p class="text-default">{{ this.user?.name }}</p>
        </div>
      </div>

      <div>
        <button class="custom" [routerLink]="['./Profile']">
          <img
            src="assets/images/profile.svg"
            height="48px"
            width="48px"
            style="border-radius: 50%"
          />
          <span class="caret ms-2"> {{ this.user?.name }} </span>
        </button>
      </div>
    </mat-toolbar>
    <section class="mt-4 p-4">
      <router-outlet></router-outlet>
    </section>
  </mat-sidenav-content>
</mat-sidenav-container>
