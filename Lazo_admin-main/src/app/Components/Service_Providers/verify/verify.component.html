
<section class="position-relative mt-2 p-5" data-aos="fade-down" data-aos-duration="1500">
   
    <div class="space_right">
        <div class="text-center mt-2 mb-3" >
          <h1 class="text-default fw-bold mb-3"> Verification Code</h1>
          <p class="text-muted mb-2">Please enter the verification code you received from</p>
          <p class="fw-bold my-2">{{email_or_phone}}</p>
        </div>
        <form class="mt-3" >
  
          <ng-otp-input class="text-center" (onInputChange)="onOtpChange($event)"  [config]="{length:4}"></ng-otp-input>
          <div class="form-group text-center mt-4 pt-1">
              <div class="col-md-12 col-sm-12">
                  <button class="btn btn-danger text-white w-100" type="button" (click)=" confirmCode()"> Send  </button>
              </div>
          </div>
       
      </form>
    </div>
  </section>
