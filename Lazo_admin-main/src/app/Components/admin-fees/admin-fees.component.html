<section class="fees">
    <div class="container-fluid">
        <div class="row main my-5">
            <div class="col-12">
               <div class="fw-bold title col-xl-6 col-lg-6 col-md-6 col-12">
                   <h2 class="text-default fw-bold m-auto"> Fees </h2>
                </div>

                <div class="fw-bold title col-xl-6 col-lg-6 col-md-6 col-12 text-end"></div>
            </div>

            <div class="col-12 mt-5 mb-3">
                <div class="form-group">
                    <label class="mb-2" for="shipping_fee">Shipping Fee</label>
                    <input type="number" id="shipping_fee" class="form-control">
                </div>
            </div>
             <div class="col-12 mb-3">
                <div class="form-group">
                    <label class="mb-2" for="base_fee">Base Fee</label>
                    <input type="number" id="base_fee" class="form-control">
                </div>
            </div>
             <div class="col-12 mb-3">
                <div class="form-group">
                    <label class="mb-2" for="additional_fee">Additional Fee</label>
                    <input type="number" id="additional_fee" class="form-control">
                </div>
            </div>

            <div class="col-12 my-3 text-end">
                <button class="btn btn-danger py-2 px-4" (click)="save()">Save</button>
            </div>
        </div>
    </div>
</section>
