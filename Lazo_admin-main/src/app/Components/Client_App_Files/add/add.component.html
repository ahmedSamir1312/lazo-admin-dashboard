<section class="add_admin p-4">
    <div class="container">
      <div class="w-100 text-end" (click)="close()">
        <img src="assets/images/close.svg" alt="close" class="pointer" height="25px" width="25px">
      </div>
  
      <div class="title text-center mb-5">
        <h2 class="text-default fw-bold m-auto">Add Contact Us info  </h2>
      </div>
      <div class="row">
        <div class="col-12">
          <form class="form" [formGroup]="form"  (ngSubmit)="add()">
            <div class="row">
           
           
              <div class="col-lg-12 mb-4">
                <div class="form-group">
                  <label class="mb-3">Email</label>
                  <input
                  placeholder="Enter Email" 
                    type="email"
                    class="form-control"
            
                    formControlName='contact_email' [ngStyle]="{'border': submitted && f.contact_email.errors? '1px solid red' : (submitted && f.contact_email.errors ? '1px solid #ebebeb' : null) }" >
                    <div class="errors" *ngIf="submitted && f.contact_email.errors">
                      <p class="text-danger mt-2" *ngIf="f.contact_email.errors?.email"> * this field must be email</p>
                      <p class="text-danger mt-2" *ngIf="f.contact_email.errors?.required"> * this field is required</p>
                    </div>
                </div>
              </div>
              <div class="col-lg-12 mb-4">
                <div class="form-group">
                  <label class="mb-3">Phone Number</label>
                  <input
                  placeholder="Enter Phone Number" 
                    type="text"
                    class="form-control"
                formControlName="contact_phone"
                [ngStyle]="{'border': submitted && f.contact_phone.errors? '1px solid red' : (submitted && f.contact_phone.errors ? '1px solid #ebebeb' : null) }" />
                  <p class="text-danger mt-2" *ngIf="f.contact_phone?.errors && submitted">
                   <span *ngIf="f.contact_phone?.errors.required"> *This field is required</span>
                   <span *ngIf="f.contact_phone?.errors.minlength"> *This field must be 11 numbers</span>
                </p>
              </div>
              </div>
              <div class="col-lg-12 mb-4">
                <div class="form-group">
                  <label class="mb-3">WhatsApp Number </label>
                  <input
                  placeholder="Enter WhatsApp Number" 
                    type="text"
                    class="form-control"
                formControlName="contact_whatsapp"
                [ngStyle]="{'border': submitted && f.contact_whatsapp.errors? '1px solid red' : (submitted && f.contact_whatsapp.errors ? '1px solid #ebebeb' : null) }" />
                  <p class="text-danger mt-2" *ngIf="f.contact_whatsapp?.errors && submitted">
                   <span *ngIf="f.contact_whatsapp?.errors.required"> *This field is required</span>
                   <span *ngIf="f.contact_whatsapp?.errors.minlength"> *This field must be 11 numbers</span>
                </p>
              </div>
              </div>
              
             
            </div>

            <div class="row my-3">
              <div class="col-md-6">
                <button type="submit"  class="btn confirm w-100">
                  Add 
                </button>
                
              </div>
              <div class="col-md-6">
                <button type="button" (click)="close()" class="btn  cancel  w-100">
                  Cancel
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>
