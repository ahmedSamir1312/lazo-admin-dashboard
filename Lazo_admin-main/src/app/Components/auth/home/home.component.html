<section class="auth">
  <div class="overlay"></div>
  <div class="form d-flex align-items-center">
    <div class="container">
      <div class="row">
        <div class="col-lg-5 m-auto">
          <div class="card">
            <div class="card-header mt-4 p-4">
              <div class="row">
                <div class="col-6">
                  <img
                    class="logo"
                    src="assets/images/logo.svg"
                    height="50px"
                    width="50px"
                  />
                </div>
                <div class="col-6 text-end">
                  <div class="dropdown flag">
                    <a
                      class="btn bg-white dropdown-toggle"
                      href="#"
                      role="button"
                      data-bs-toggle="dropdown"
                      aria-expanded="false"
                    >
                      <img [src]="flags[1].flag" alt="" class="mx-1" />
                      <span class="text-black">
                        {{ flags[1].name }}
                      </span>
                    </a>

                    <!-- <ul class="dropdown-menu">
                        @for (item of flags; track $index) {
                            <li>
                                <a class="dropdown-item "
                                  ><img [src]="item.flag" alt="" srcset="" />
                                  {{ item.name }}</a
                                >
                              </li>
                        }
                    
                    </ul> -->
                  </div>
                </div>
              </div>
            </div>
            <div class="card-body my-3">
              <div class="title text-center my-4">
                <h3 style="font-size: 25px">Welcome Back!</h3>
                <p style="color: #808080; font-size: 13px">
                  Hala! Let's get started
                </p>
              </div>
              <form class="mt-3" [formGroup]="form" (ngSubmit)="submit()">
                <div class="form-group col-md-12 my-3">
                  <input
                    type="text"
                    class="form-control p-3"
                    placeholder="Email"
                    formControlName="email_or_phone"
                    [ngStyle]="{
                      border:
                        submitted && f.email_or_phone.errors
                          ? '1px solid red'
                          : submitted && f.email_or_phone.errors
                          ? '1px solid #ebebeb'
                          : null
                    }"
                  />
                  <div
                    class="errors"
                    *ngIf="submitted && f.email_or_phone.errors"
                  >
                    <p
                      class="text-danger mt-2"
                      *ngIf="f.email_or_phone.errors?.email"
                    >
                      * this field must be email
                    </p>
                    <p
                      class="text-danger mt-2"
                      *ngIf="f.email_or_phone.errors?.required"
                    >
                      * this field is required
                    </p>
                  </div>
                </div>

                <div class="form-group row mt-3">
                  <div class="col-md-12">
                    <input
                      [type]="pass_type == false ? 'password' : 'text'"
                      class="form-control p-3"
                      placeholder="Password"
                      #input
                      formControlName="password"
                      [ngStyle]="{
                        border:
                          submitted && f.password.errors?.required == true
                            ? '1px solid red'
                            : submitted && f.password.errors?.required == false
                            ? '1px solid #ebebeb'
                            : null
                      }"
                    />

                    <span class="eye">
                      <img
                        (click)="pass_type = !pass_type"
                        src="assets/images/{{
                          pass_type == false ? 'eye' : 'hide'
                        }}.svg"
                        height="20px"
                        width="20px"
                      />
                    </span>

                    <div class="errors" *ngIf="submitted && f.password.errors">
                      <p
                        class="text-danger mt-2"
                        *ngIf="f.password.errors.required"
                      >
                        * this field is required
                      </p>
                    </div>
                  </div>
                </div>

                <div class="form-group text-center mt-3 mb-5 pt-1">
                  <div class="col-md-12 col-sm-12">
                    <button class="btn btn-danger text-white w-100">
                      Login
                    </button>
                  </div>
                </div>
              </form>
            </div>
          </div>
          <!-- <form>
                <div class="mb-3">
                  <label for="exampleInputEmail1" class="form-label">Email address</label>
                  <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                
                </div>
                <div class="mb-3">
                  <label for="exampleInputPassword1" class="form-label">Password</label>
                  <input type="password" class="form-control" id="exampleInputPassword1">
                </div>
                <div class="mb-4">
                <button type="submit" class="btn w-100">Submit</button>
                </div>
              </form> -->
        </div>
      </div>
    </div>
  </div>
</section>
