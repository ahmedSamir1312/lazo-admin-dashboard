<section class="add_admin p-4">
  <div class="container">
    <div class="w-100 text-end">
      <svg
        (click)="close()"
        style="cursor: pointer"
        width="22"
        height="22"
        viewBox="0 0 22 22"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M13.5896 8.39922L8.40913 13.5797"
          stroke="#8088A4"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <path
          d="M13.5922 13.5824L8.40677 8.39694"
          stroke="#8088A4"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <path
          fill-rule="evenodd"
          clip-rule="evenodd"
          d="M15.6857 1H6.31429C3.04762 1 1 3.31208 1 6.58516V15.4148C1 18.6879 3.0381 21 6.31429 21H15.6857C18.9619 21 21 18.6879 21 15.4148V6.58516C21 3.31208 18.9619 1 15.6857 1Z"
          stroke="#8088A4"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </div>

    <div class="title text-center mb-5">
      <h2 class="text-default fw-bold m-auto">Add Contact Us info</h2>
    </div>
    <div class="row">
      <div class="col-12">
        <form class="form" [formGroup]="form" (ngSubmit)="add()">
          <div class="row">
            <div class="col-lg-12 mb-4">
              <div class="form-group">
                <label class="mb-3">Email</label>
                <input
                  placeholder="Enter Email"
                  type="email"
                  class="form-control"
                  formControlName="contact_email"
                  [ngStyle]="{
                    border:
                      submitted && f.contact_email.errors
                        ? '1px solid red'
                        : submitted && f.contact_email.errors
                        ? '1px solid #ebebeb'
                        : null
                  }"
                />
                <div class="errors" *ngIf="submitted && f.contact_email.errors">
                  <p
                    class="text-danger mt-2"
                    *ngIf="f.contact_email.errors?.email"
                  >
                    * this field must be email
                  </p>
                  <p
                    class="text-danger mt-2"
                    *ngIf="f.contact_email.errors?.required"
                  >
                    * this field is required
                  </p>
                </div>
              </div>
            </div>
            <div class="col-lg-12 mb-4">
              <div class="form-group">
                <label class="mb-3">Phone Number</label>
                <input
                  placeholder="Enter Phone Number"
                  type="text"
                  class="form-control"
                  formControlName="contact_phone"
                  [ngStyle]="{
                    border:
                      submitted && f.contact_phone.errors
                        ? '1px solid red'
                        : submitted && f.contact_phone.errors
                        ? '1px solid #ebebeb'
                        : null
                  }"
                />
                <p
                  class="text-danger mt-2"
                  *ngIf="f.contact_phone?.errors && submitted"
                >
                  <span *ngIf="f.contact_phone?.errors.required">
                    *This field is required</span
                  >
                  <span *ngIf="f.contact_phone?.errors.minlength">
                    *This field must be 11 numbers</span
                  >
                </p>
              </div>
            </div>
            <div class="col-lg-12 mb-4">
              <div class="form-group">
                <label class="mb-3">WhatsApp Number </label>
                <input
                  placeholder="Enter WhatsApp Number"
                  type="text"
                  class="form-control"
                  formControlName="contact_whatsapp"
                  [ngStyle]="{
                    border:
                      submitted && f.contact_whatsapp.errors
                        ? '1px solid red'
                        : submitted && f.contact_whatsapp.errors
                        ? '1px solid #ebebeb'
                        : null
                  }"
                />
                <p
                  class="text-danger mt-2"
                  *ngIf="f.contact_whatsapp?.errors && submitted"
                >
                  <span *ngIf="f.contact_whatsapp?.errors.required">
                    *This field is required</span
                  >
                  <span *ngIf="f.contact_whatsapp?.errors.minlength">
                    *This field must be 11 numbers</span
                  >
                </p>
              </div>
            </div>

            <div class="row my-3">
              <div class="col-md-6">
                <button type="submit" class="btn confirm w-100">Add</button>
              </div>
              <div class="col-md-6">
                <button
                  type="button"
                  (click)="close()"
                  class="btn cancel w-100"
                >
                  Cancel
                </button>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
