<section class="admin_details py-3">
  <div class="container">
    <div class="w-100 text-end">
      <svg
        (click)="close()"
        style="cursor: pointer"
        width="22"
        height="22"
        viewBox="0 0 22 22"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M13.5896 8.39922L8.40913 13.5797"
          stroke="#8088A4"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <path
          d="M13.5922 13.5824L8.40677 8.39694"
          stroke="#8088A4"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <path
          fill-rule="evenodd"
          clip-rule="evenodd"
          d="M15.6857 1H6.31429C3.04762 1 1 3.31208 1 6.58516V15.4148C1 18.6879 3.0381 21 6.31429 21H15.6857C18.9619 21 21 18.6879 21 15.4148V6.58516C21 3.31208 18.9619 1 15.6857 1Z"
          stroke="#8088A4"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </div>

    <div class="title text-center">
      <h2 class="text-default fw-bold m-auto">Admin Details</h2>
    </div>
    <div class="row">
      <div class="col-12">
        <form class="form">
          <div class="row">
            <div class="col-lg-12 mb-4">
              <div class="form-group">
                <label class="mb-3">Name</label>
                <input
                  readonly
                  type="text"
                  class="form-control"
                  [value]="user?.name"
                />
              </div>
            </div>
            <div class="col-lg-12 mb-4">
              <div class="form-group">
                <label class="mb-3">Email</label>
                <input
                  readonly
                  type="text"
                  class="form-control"
                  [value]="user?.email"
                />
              </div>
            </div>
            <div class="col-lg-12 mb-4">
              <div class="form-group">
                <label class="mb-3">Phone Number</label>
                <input
                  readonly
                  type="text"
                  class="form-control"
                  [value]="user?.phone"
                />
              </div>
            </div>
            <div class="col-lg-12 mb-4">
              <div class="form-group">
                <label class="mb-3">Role Name</label>
                <input
                  readonly
                  type="text"
                  class="form-control"
                  [value]="user?.role"
                />
              </div>
            </div>
            <div class="col-lg-12 mb-4">
              <label class="mb-3">Roles</label>
              <div class="form-control" style="min-height: 50px">
                @for (item of user?.permissions ; track $index) {
                <span class="mx-1">
                  {{ item.name }}
                </span>
                }
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
