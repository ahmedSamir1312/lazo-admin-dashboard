<section class="add_admin p-4">
  <div class="container">
    <div class="title text-center mb-5">
      <h2 class="text-default fw-bold m-auto">Edit date && time</h2>
    </div>
    <div class="row">
      <div class="col-12">
        <form class="form" [formGroup]="form">
          <div class="row">
            <div class="col-md-12 col-12 form-group toggle-example mb-4">
              <label class="mb-3">delivery date </label>
              <input
                formControlName="delivery_date"
                matInput
                readonly
                [matDatepicker]="picker"
                placeholder="Enter Code Expiration Date
                "
                #ref
                (dateChange)="dateValueChange(ref)"
              />
              <mat-datepicker-toggle
                matIconSuffix
                [for]="picker"
              ></mat-datepicker-toggle>
              <mat-datepicker #picker></mat-datepicker>
            </div>

            <div class="col-lg-12 mb-4">
              <div class="form-group position-relative">
                <label class="mb-3">delivery time</label>
                <!-- <span style="position: absolute; top:55px; right: 20px; z-index: 22;" >  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 8.5L12 15.5L5 8.5" stroke="#E21B33" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg></span> -->

                <!-- <ng-select
                  [items]="types"
                  style="border-radius: 8px"
                  #select
                  class="promo"
                  placeholder="Enter Promo Code Type "
                  (close)="select.blur()"
                  [clearable]="false"
                  appendTo="body"
                  dropdownPosition="bottom"
                  [ngModelOptions]="{ standalone: true }"
                  [(ngModel)]="time"
                >
                </ng-select> -->
                <ng-select
                  [ngModelOptions]="{ standalone: true }"
                  [(ngModel)]="time"
                  placeholder="Enter Promo Code Type"
                  [clearable]="false">

                  <ng-option *ngFor="let type of types" [value]="type.id">
                    {{ type.from +'-'+ type.to }}
                  </ng-option>

                </ng-select>

              </div>
            </div>
            @if (this.order?.order_family=="collective") {
            <div class="col-lg-12 mb-4">
              <div class="form-group position-relative">
                <label class="mb-3">packaging provider</label>

                <ng-select
                  [items]="details"
                  style="border-radius: 8px"
                  #select
                  class="promo"
                  placeholder="Choose  packaging_provider "
                  (close)="select.blur()"
                  [clearable]="false"
                  bindLabel="name"
                  bindValue="id"
                  appendTo="body"
                  dropdownPosition="top"
                  [ngModelOptions]="{ standalone: true }"
                  [(ngModel)]="packaging_provider"
                >
                </ng-select>
              </div>
            </div>
            }
          </div>
          <div class="row my-3">
            <button type="button" (click)="close()" class="btn confirm w-100">
              Edit
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
